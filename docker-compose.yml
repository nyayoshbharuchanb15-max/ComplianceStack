version: "3.9"

networks:
  governance-net:
    driver: bridge

volumes:
  postgres-data:
  neo4j-data:
  redis-data:

services:
  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  WARNING: All default passwords/secrets below are for local     ║
  # ║  demonstration ONLY. Override every secret via .env before      ║
  # ║  any non-local deployment. See .env.example for all options.    ║
  # ╚══════════════════════════════════════════════════════════════════╝
  # ─── PostgreSQL Evidence Store ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: compliance-stack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-governance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-governance_secret}
      POSTGRES_DB: ${POSTGRES_DB:-evidence_store}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - governance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-governance} -d ${POSTGRES_DB:-evidence_store}"]
      interval: 5s
      retries: 10

  # ─── Neo4j Provenance Graph ────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: compliance-stack-neo4j
    restart: unless-stopped
    environment:
      # ╔════════════════════════════════════════════════════════════╗
      # ║  WARNING: Demo default password — override in .env       ║
      # ╚════════════════════════════════════════════════════════════╝
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-governance_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7687:7687"   # Bolt
      - "7474:7474"   # HTTP browser
    volumes:
      - neo4j-data:/data
      - ./cypher/init.cypher:/init.cypher:ro
    networks:
      - governance-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-governance_secret} 'RETURN 1;'"]
      interval: 10s
      retries: 10

  # ─── Redis Async Engine ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: compliance-stack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - governance-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ─── Python FastAPI Backend ─────────────────────────────────────
  python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: compliance-stack-python
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-governance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-governance_secret}
      POSTGRES_DB: ${POSTGRES_DB:-evidence_store}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-governance_secret}
      REDIS_URL: redis://redis:6379/0
      # ╔════════════════════════════════════════════════════════════════╗
      # ║  WARNING: Demo defaults — set strong secrets in .env    ║
      # ║  AUTH_PRIVATE_KEY:  openssl genrsa -out private.pem 2048 ║
      # ║  SIGNING_KEY:       openssl genpkey -algorithm ed25519   ║
      # ╚════════════════════════════════════════════════════════════════╝
      SIGNING_KEY_PRIVATE: ${SIGNING_KEY_PRIVATE:-}
      SIGNING_KEY_PUBLIC: ${SIGNING_KEY_PUBLIC:-}
      AUTH_PRIVATE_KEY_PATH: ${AUTH_PRIVATE_KEY_PATH:-}
      AUTH_PRIVATE_KEY: ${AUTH_PRIVATE_KEY:-}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,http://localhost:3001}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,python-backend,mcp-server,127.0.0.1}
      DEMO_MODE: ${DEMO_MODE:-true}
      ADV_ENDPOINT_URL: ${ADV_ENDPOINT_URL:-}         # Optional: external LLM endpoint for adversarial testing; empty = local/skipped
      ADV_API_KEY: ${ADV_API_KEY:-}                    # Optional: API key for ADV_ENDPOINT_URL (only needed if set)
      ADV_TARGET_MODEL: ${ADV_TARGET_MODEL:-gpt-4o-mini}  # Model at external endpoint for test generation
      ADV_JUDGE_MODEL: ${ADV_JUDGE_MODEL:-gpt-4o-mini}    # Model at external endpoint for test evaluation
      ADV_EMBEDDING_MODEL: ${ADV_EMBEDDING_MODEL:-all-MiniLM-L6-v2}  # Embedding model (local or external)
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-20}
      RATE_LIMIT_WRITE: ${RATE_LIMIT_WRITE:-60}
      RATE_LIMIT_READ: ${RATE_LIMIT_READ:-120}
      MAX_BODY_SIZE: ${MAX_BODY_SIZE:-10485760}
      MODEL_DIR: ${MODEL_DIR:-./models}
      DATA_DIR: ${DATA_DIR:-./data}
    ports:
      - "8000:8000"
    networks:
      - governance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      retries: 5

  # ─── TypeScript MCP Server ─────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: compliance-stack-mcp
    restart: unless-stopped
    depends_on:
      python-backend:
        condition: service_healthy
    environment:
      PYTHON_BACKEND_URL: http://python-backend:8000
      NODE_ENV: production
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-stdio}
      PORT: ${MCP_PORT:-3000}
    ports:
      - "${MCP_PORT:-3000}:${MCP_PORT:-3000}"   # SSE / Streamable HTTP port
    # MCP supports all three transport modes:
    #   - stdio: Claude Desktop integration (default)
    #   - sse: Web-based MCP clients via GET /sse + POST /messages
    #   - streamable-http: Modern MCP clients via POST/GET/DELETE /mcp
    # Set MCP_TRANSPORT=streamable-http or MCP_TRANSPORT=sse in .env to enable
    stdin_open: true   # stdio mode for Claude Desktop integration
    tty: true
    command: ["node", "dist/index.js"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${MCP_PORT:-3000}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - governance-net

  # ─── Web UI ──────────────────────────────────────────────────────
  web-ui:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: compliance-stack-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - governance-net
