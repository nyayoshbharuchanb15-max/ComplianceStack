# ═══════════════════════════════════════════════════════════════════
#  ComplianceStack — CI/CD Pipeline
#  Runs tests, linting, and builds for both Python backend
#  and TypeScript MCP server on every push and PR.
# ═══════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Python Backend ────────────────────────────────────────────
  python-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with mypy
        run: python -m mypy . --ignore-missing-imports --exclude tests/
        continue-on-error: true
        env:
          AUTH_PRIVATE_KEY: ""
          SIGNING_KEY_PRIVATE: ""

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -m "not integration"
        env:
          AUTH_PRIVATE_KEY: ""
          SIGNING_KEY_PRIVATE: ""
          ADV_ENDPOINT_URL: ""
          ADV_API_KEY: ""
          ADV_TARGET_MODEL: ""
          ADV_JUDGE_MODEL: ""
          ADV_EMBEDDING_MODEL: ""
          PYTHONPATH: ..

      - name: Check import sanity
        run: python -c "from main import app; print(f'App loaded: {app.title} v{app.version}')"

  # ─── TypeScript MCP Server ─────────────────────────────────────
  mcp-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check build output
        run: test -f dist/index.js && echo "Build successful" || exit 1

  # ─── Docker Image Build Test ───────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images (no push)
        run: docker compose build

  # ─── Docker Deployment ────────────────────────────────────────────
  docker-deploy:
    runs-on: ubuntu-latest
    needs: [python-backend, mcp-server, docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          echo "Building and pushing ComplianceStack Docker images for ${{ github.sha }}"
          
          # Build and push MCP server image
          docker buildx build --platform linux/amd64 --push \
            --tag compliancestack/mcp-server:${{ github.sha }} \
            --tag compliancestack/mcp-server:latest \
            --file ./mcp-server/Dockerfile ./mcp-server/
          
          # Build and push Python backend image  
          docker buildx build --platform linux/amd64 --push \
            --tag compliancestack/python-backend:${{ github.sha }} \
            --tag compliancestack/python-backend:latest \
            --file ./python-backend/Dockerfile ./python-backend/
          
          # Tag and push root Docker image
          docker buildx build --platform linux/amd64 --push \
            --tag compliancestack:latest \
            --tag compliancestack:${{ github.sha }} .
          
          echo "✅ ComplianceStack images pushed successfully"
