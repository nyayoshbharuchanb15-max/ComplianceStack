<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComplianceStack - AI Compliance Auditing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 800px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .tagline {
            font-size: 24px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .feature-text {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .cta {
            background: white;
            color: #667eea;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }
        
        .cta:hover {
            transform: translateY(-2px);
        }
        
        .github {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️ ComplianceStack</div>
        <div class="tagline">Enterprise AI Governance Platform</div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <div class="feature-text">17-Phase Audit Pipeline</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔌</div>
                <div class="feature-text">MCP Integration</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-text">Zero Data Egress</div>
            </div>
        </div>
        
        <div class="badges">
            <span class="badge">EU AI Act</span>
            <span class="badge">GDPR</span>
            <span class="badge">NIST AI RMF</span>
            <span class="badge">ISO 42001</span>
            <span class="badge">India DPDP Act</span>
        </div>
        
        <a href="https://github.com/nyayoshbharuchanb15-max/ComplianceStack" class="cta">
            ⭐ Star on GitHub
        </a>
        
        <div class="github">
            github.com/nyayoshbharuchanb15-max/ComplianceStack
        </div>
    </div>
</body>
</html>
