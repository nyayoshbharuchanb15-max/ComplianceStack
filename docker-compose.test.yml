# ═══════════════════════════════════════════════════════════════════
#  ComplianceStack — Live Integration Test Profile
#  Boots isolated test instances of all 6 services with unique
#  ports and databases to avoid conflicts with dev/production.
#
#  Usage:
#    docker compose -f docker-compose.test.yml up -d --build
#    docker compose -f docker-compose.test.yml run --rm test-runner
#    docker compose -f docker-compose.test.yml down -v
# ═══════════════════════════════════════════════════════════════════

networks:
  test-net:
    driver: bridge

volumes:
  test-postgres-data:
  test-neo4j-data:
  test-redis-data:

services:
  # ─── PostgreSQL (Test) ────────────────────────────────────────
  test-postgres:
    image: postgres:16-alpine
    container_name: compliance-stack-test-postgres
    environment:
      POSTGRES_USER: test_governance
      POSTGRES_PASSWORD: test_secret_2024
      POSTGRES_DB: test_evidence_store
    ports:
      - "15432:5432"
    volumes:
      - test-postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - test-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_governance -d test_evidence_store"]
      interval: 3s
      retries: 20

  # ─── Neo4j (Test) ───────────────────────────────────────────
  test-neo4j:
    image: neo4j:5-community
    container_name: compliance-stack-test-neo4j
    environment:
      NEO4J_AUTH: neo4j/test_secret_2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "17687:7687"
      - "17474:7474"
    volumes:
      - test-neo4j-data:/data
    networks:
      - test-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p test_secret_2024 'RETURN 1;'"]
      interval: 5s
      retries: 20

  # ─── Redis (Test) ────────────────────────────────────────────
  test-redis:
    image: redis:7-alpine
    container_name: compliance-stack-test-redis
    ports:
      - "16379:6379"
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 20

  # ─── Python Backend (Test) ──────────────────────────────────
  test-python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: compliance-stack-test-python
    depends_on:
      test-postgres:
        condition: service_healthy
      test-neo4j:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: test_governance
      POSTGRES_PASSWORD: test_secret_2024
      POSTGRES_DB: test_evidence_store
      POSTGRES_HOST: test-postgres
      POSTGRES_PORT: 5432
      NEO4J_URI: bolt://test-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test_secret_2024
      REDIS_URL: redis://test-redis:6379/0
      DEMO_MODE: "true"
      PRODUCTION_MODE: "false"
      CORS_ORIGINS: "*"
      TRUSTED_HOSTS: "*"
      RATE_LIMIT_AUTH: "200"
      RATE_LIMIT_WRITE: "200"
      RATE_LIMIT_READ: "500"
    ports:
      - "18000:8000"
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 5s
      retries: 20
      start_period: 10s

  # ─── Test Runner ─────────────────────────────────────────────
  test-runner:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: compliance-stack-test-runner
    depends_on:
      test-python-backend:
        condition: service_healthy
    environment:
      TEST_BACKEND_URL: http://test-python-backend:8000
      DEMO_MODE: "true"
    networks:
      - test-net
    volumes:
      - ./tests/e2e:/tests/e2e:ro
    command: >
      python -m pytest /tests/e2e/
        -v
        --tb=short
        --junitxml=/tests/e2e-results.xml
        -x
    profiles:
      - test
